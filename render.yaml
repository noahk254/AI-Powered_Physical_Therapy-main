services:
  - type: web
    name: therapy-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install --no-cache-dir -r requirements.txt
    startCommand: |
      python -m uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: CORS_ORIGINS
        value: "http://localhost:5173,http://localhost:3000,https://therapy-ai-mu.vercel.app"
      - key: DATABASE_URL
        value: sqlite:///./therapy.db
