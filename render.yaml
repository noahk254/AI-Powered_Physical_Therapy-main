services:
  - type: web
    name: therapy-ai-backend
    env: python
    pythonVersion: "3.11"
    region: oregon
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHONUNBUFFERED
        value: "1"