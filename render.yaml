services:
  - type: web
    name: therapy-ai-backend
    env: python
    pythonVersion: "3.11"
    region: oregon
    buildCommand: pip install pip==25.3.1 --upgrade && pip install -r requirements.txt
    startCommand: sh -c "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PIP_DISABLE_PIP_VERSION_CHECK
        value: "1"